.cat-card{background:#161616;border-radius:16px;padding:14px 12px;cursor:pointer;}
.cat-icon{font-size:22px;margin-bottom:6px;}
.cat-name{font-size:12px;font-weight:800;margin-bottom:6px;line-height:1.2;}
.cat-pct{font-size:18px;font-weight:900;margin-bottom:4px;}

var state = {date:"",completions:{},water:0,steps:0,weekData:[0,0,0,0,0,0,0]};

function todayKey(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}

function loadState(){
  try {
    var saved=localStorage.getItem("lw3");
    var today=todayKey();
    if(saved){
      var p=JSON.parse(saved);
      if(p.date===today){state=p;}
      else{
        var wd=p.weekData||[0,0,0,0,0,0,0];
        wd.shift();wd.push(calcScore(p.completions||{}));
        state.weekData=wd;state.date=today;state.completions={};state.water=0;state.steps=0;
        saveState();
      }
    } else {state.date=today;saveState();}
  } catch(e){state.date=todayKey();}
}

function saveState(){
  try{state.date=todayKey();localStorage.setItem("lw3",JSON.stringify(state));}catch(e){}
}

function calcScore(c){
  var t=0,d=0;
  for(var i=0;i<CATS.length;i++){for(var j=0;j<CATS[i].tasks.length;j++){t++;if(c[CATS[i].tasks[j].id])d++;}}
  return t>0?Math.round((d/t)*100):0;
}

function getCatStats(id){
  var cat=null;
  for(var i=0;i<CATS.length;i++){if(CATS[i].id===id){cat=CATS[i];break;}}
  if(!cat)return{done:0,total:0,pct:0};
  var t=cat.tasks.length,d=0;
  for(var j=0;j<cat.tasks.length;j++){if(state.completions[cat.tasks[j].id])d++;}
  return{done:d,total:t,pct:t>0?Math.round((d/t)*100):0};
}

function getTotals(){
  var t=0,d=0;
  for(var i=0;i<CATS.length;i++){for(var j=0;j<CATS[i].tasks.length;j++){t++;if(state.completions[CATS[i].tasks[j].id])d++;}}
  return{done:d,left:t-d,total:t,pct:t>0?Math.round((d/t)*100):0};
}

function toast(msg){
  var el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  setTimeout(function(){el.classList.remove("show");},2500);
}

function progBar(pct,color){
  return "<div class='prog-wrap'><div class='prog-fill' style='width:"+pct+"%;background:"+color+";'></div></div>";
}

function ring(pct,color,size,stroke){
  size=size||120;stroke=stroke||10;
  var r=(size/2)-stroke,circ=2*Math.PI*r,dash=(pct/100)*circ,cx=size/2;
  return "<svg width='"+size+"' height='"+size+"' viewBox='0 0 "+size+" "+size+"'>"
    +"<circle cx='"+cx+"' cy='"+cx+"' r='"+r+"' fill='none' stroke='#222' stroke-width='"+stroke+"'/>"
    +"<circle cx='"+cx+"' cy='"+cx+"' r='"+r+"' fill='none' stroke='"+color+"' stroke-width='"+stroke+"' stroke-dasharray='"+dash+" "+circ+"' stroke-linecap='round' transform='rotate(-90 "+cx+" "+cx+")'/ >"
    +"<text x='"+cx+"' y='"+(cx+2)+"' text-anchor='middle' dominant-baseline='middle' fill='"+color+"' font-size='"+Math.round(size*0.2)+"' font-weight='900' font-family='Nunito,sans-serif'>"+pct+"%</text>"
    +"</svg>";
}

function dateStr(){
  var d=new Date();
  var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  return days[d.getDay()]+", "+months[d.getMonth()]+" "+d.getDate();
}

function switchTab(name,btn){
  var pages=document.querySelectorAll(".tab-page");
  for(var i=0;i<pages.length;i++)pages[i].classList.remove("active");
  var btns=document.querySelectorAll(".nav-btn");
  for(var i=0;i<btns.length;i++)btns[i].classList.remove("active");
  document.getElementById("task-detail").style.display="none";
  var page=document.getElementById("tab-"+name);
  if(page)page.classList.add("active");
  if(btn)btn.classList.add("active");
  if(name==="home")renderHome();
  if(name==="tasks")renderTaskList();
  if(name==="experts")renderExperts();
  if(name==="progress")renderProgress();
  document.getElementById("tab-content").scrollTop=0;
}

function renderHome(){
  var el=document.getElementById("tab-home");
  if(!el)return;
  var s=getTotals();
  var pct=s.pct;
  var rc=pct>=80?"#00C853":(pct>=50?"#FFD600":"#FF2D6B");
  var quote=QUOTES[new Date().getDay()%QUOTES.length];
  var wPct=Math.min(100,Math.round((state.water/10)*100));
  var h="";
  h+="<div class='hero-card'>";
  h+="<div class='hero-greeting'>Hey <span>Laura!</span> &#x1F338;</div>";
  h+="<div class='hero-date'>"+dateStr()+"</div>";
  h+="<div class='hero-quote'>"+quote+"</div>";
  h+="</div>";
  h+="<div class='ring-row'>";
  h+="<div style='flex-shrink:0;text-align:center;'>"+ring(pct,rc,110,10)+"<div class='ring-label'>Todays Healing</div></div>";
  h+="<div class='stat-col'>";
  h+="<div class='stat-box'><span class='lbl'>Done</span><span class='val' style='color:#00C853;'>"+s.done+"</span></div>";
  h+="<div class='stat-box'><span class='lbl'>Left</span><span class='val' style='color:#FF2D6B;'>"+s.left+"</span></div>";
  h+="<div class='stat-box'><span class='lbl'>Steps</span><span class='val' style='color:#FFD600;'>"+state.steps+"</span></div>";
  h+="</div></div>";
  h+="<div class='water-card'>";
  h+="<div class='water-title'>&#x1F4A7; Water Intake</div>";
  h+="<div class='water-row'>";
  h+="<button class='btn-circle' onclick='waterChange(-1)'>-</button>";
  h+="<div><div class='water-num'>"+state.water+"</div><div class='water-sub'>of 10 glasses</div></div>";
  h+="<button class='btn-circle' onclick='waterChange(1)'>+</button>";
  h+="</div>";
  h+=progBar(wPct,"linear-gradient(90deg,#00B4D8,#48cae4)");
  h+="</div>";
  h+="<div class='sec-title'>Todays Categories</div>";
  h+="<div class='cat-grid'>";
  for(var i=0;i<CATS.length;i++){
    var cat=CATS[i];
    var cs=getCatStats(cat.id);
    h+="<div class='cat-card' onclick='openCatHome(\""+cat.id+"\")' style='border:1px solid "+cat.color+"33;'>";
    h+="<div class='cat-icon'>"+cat.emoji+"</div>";
    h+="<div class='cat-name'>"+cat.name+"</div>";
    h+="<div class='cat-pct' style='color:"+cat.color+";'>"+cs.pct+"%</div>";
    h+=progBar(cs.pct,cat.color);
    h+="</div>";
  }
  h+="</div>";
  h+="<div class='tip-card'>";
  h+="<div class='tip-title'>&#x26A1; POTS Morning Protocol</div>";
  h+="<div class='tip-text'>1. Drink electrolytes BEFORE getting up<br>2. Do 10 ankle pumps in bed<br>3. Sit at bed edge for 60 seconds<br>4. Put on compression stockings while seated<br>5. Rise slowly and have a wall or chair nearby</div>";
  h+="</div>";
  el.innerHTML=h;
}

function openCatHome(id){
  var btns=document.querySelectorAll(".nav-btn");
  for(var i=0;i<btns.length;i++)btns[i].classList.remove("active");
  btns[1].classList.add("active");
  var pages=document.querySelectorAll(".tab-page");
  for(var i=0;i<pages.length;i++)pages[i].classList.remove("active");
  setTimeout(function(){openCat(id);},50);
}

function waterChange(d){
  state.water=Math.max(0,Math.min(20,state.water+d));
  saveState();renderHome();
  if(state.water===10)toast("Hydration goal reached! Amazing!");
}

function renderTaskList(){
  document.getElementById("task-detail").style.display="none";
  document.getElementById("tab-tasks").classList.add("active");
  var el=document.getElementById("tab-tasks");
  var h="<div class='sec-title'>Task Categories</div>";
  for(var i=0;i<CATS.length;i++){
    var cat=CATS[i];
    var cs=getCatStats(cat.id);
    h+="<div class='task-cat-row' onclick='openCat(\""+cat.id+"\")'>";
    h+="<div class='task-cat-ico'>"+cat.emoji+"</div>";
    h+="<div class='task-cat-info'>";
    h+="<div class='task-cat-name' style='color:"+cat.color+";'>"+cat.name+"</div>";
    h+="<div class='task-cat-sub'>"+cs.done+" of "+cs.total+" completed</div>";
    h+=progBar(cs.pct,cat.color);
    h+="</div>";
    h+="<div class='task-cat-pct' style='color:"+cat.color+";'>"+cs.pct+"%</div>";
    h+="</div>";
  }
  el.innerHTML=h;
}

function openCat(catId){
  var cat=null;
  for(var i=0;i<CATS.length;i++){if(CATS[i].id===catId){cat=CATS[i];break;}}
  if(!cat)return;
  var pages=document.querySelectorAll(".tab-page");
  for(var i=0;i<pages.length;i++)pages[i].classList.remove("active");
  var det=document.getElementById("task-detail");
  det.style.display="block";
  var h="<button class='back-btn' onclick='backToCats()'>&#x2190; Back</button>";
  h+="<div style='font-size:20px;font-weight:900;color:"+cat.color+";margin-bottom:14px;'>"+cat.emoji+" "+cat.name+"</div>";
  for(var j=0;j<cat.tasks.length;j++){
    var task=cat.tasks[j];
    var chk=state.completions[task.id]?true:false;
    h+=taskHTML(task,chk,cat.color);
  }
  h+="<button class='add-btn' onclick='toggleAddForm(\""+catId+"\")'>+ Add Custom Task</button>";
  h+="<div id='af-"+catId+"' class='add-form'>";
  h+="<input class='finput' id='fn-"+catId+"' placeholder='Task name' type='text'>";
  h+="<textarea class='finput' id='fd-"+catId+"' placeholder='Details' rows='3' style='resize:none;'></textarea>";

h+=”<button class='fsub' onclick='addTask(\""+catId+"\")'>Add Task</button>”;
h+=”</div>”;
det.innerHTML=h;
document.getElementById(“tab-content”).scrollTop=0;
}

function taskHTML(task,chk,color){
var cc=chk?“chk on”:“chk”;
var ns=chk?“task-name done”:“task-name”;
return “<div class='task-item' id='ti-"+task.id+"'>”
+”<div class='task-top'>”
+”<div class='"+cc+"' onclick='toggleTask(\""+task.id+"\")' id='chk-"+task.id+"'></div>”
+”<div class='task-info'>”
+”<div class='"+ns+"' id='tn-"+task.id+"'>”+task.name+”</div>”
+”<div class='task-time' style='color:"+color+";'>”+task.time+”</div>”
+”<div class='task-detail-txt'>”+task.detail+”</div>”
+”</div></div>”
+”<button class='task-remove' onclick='removeTask(\""+task.id+"\")'>Remove</button>”
+”</div>”;
}

function toggleTask(id){
state.completions[id]=!state.completions[id];
saveState();
var chk=document.getElementById(“chk-”+id);
var tn=document.getElementById(“tn-”+id);
if(chk&&tn){
if(state.completions[id]){chk.className=“chk on”;tn.className=“task-name done”;toast(“Great job! Keep it up!”);}
else{chk.className=“chk”;tn.className=“task-name”;}
}
}

function removeTask(id){
for(var i=0;i<CATS.length;i++){
for(var j=0;j<CATS[i].tasks.length;j++){
if(CATS[i].tasks[j].id===id){CATS[i].tasks.splice(j,1);break;}
}
}
delete state.completions[id];saveState();
var el=document.getElementById(“ti-”+id);if(el)el.remove();
}

function backToCats(){
document.getElementById(“task-detail”).style.display=“none”;
document.getElementById(“tab-tasks”).classList.add(“active”);
renderTaskList();
}

function toggleAddForm(id){
var f=document.getElementById(“af-”+id);
if(f)f.style.display=f.style.display===“none”||f.style.display===””?“block”:“none”;
}

function addTask(catId){
var ne=document.getElementById(“fn-”+catId);
var de=document.getElementById(“fd-”+catId);
if(!ne||!ne.value.trim()){toast(“Please enter a task name”);return;}
var t={id:“c”+Date.now(),name:ne.value.trim(),time:“Any Time”,detail:de?de.value.trim():””};
for(var i=0;i<CATS.length;i++){if(CATS[i].id===catId){CATS[i].tasks.push(t);break;}}
ne.value=””;if(de)de.value=””;
saveState();openCat(catId);toast(“Task added!”);
}

function renderExperts(){
var el=document.getElementById(“tab-experts”);
var h=”<div class='sec-title'>Your Expert Team</div>”;
for(var i=0;i<EXPERTS.length;i++){
var e=EXPERTS[i];
h+=”<div class='exp-card' id='ec"+i+"'>”;
h+=”<div class='exp-head' onclick='toggleExp("+i+")'>”;
h+=”<div class='exp-emoji'>”+e.emoji+”</div>”;
h+=”<div class='exp-info'><div class='exp-name' style='color:"+e.color+";'>”+e.name+”</div><div class='exp-role'>”+e.role+”</div></div>”;
h+=”<div class='exp-chev'>▼</div>”;
h+=”</div><div class='exp-body'><div class='exp-body-inner'>”;
for(var j=0;j<e.bullets.length;j++){
h+=”<div class='exp-bullet'><span style='color:"+e.color+";font-size:16px;'>•</span><span>”+e.bullets[j]+”</span></div>”;
}
h+=”</div></div></div>”;
}
el.innerHTML=h;
}

function toggleExp(i){
var c=document.getElementById(“ec”+i);if(c)c.classList.toggle(“open”);
}

function renderProgress(){
var el=document.getElementById(“tab-progress”);
var score=calcScore(state.completions);
var rc=score>=80?”#00C853”:(score>=50?”#FFD600”:”#FF2D6B”);
var days=[“Mon”,“Tue”,“Wed”,“Thu”,“Fri”,“Sat”,“Sun”];
var sPct=Math.min(100,Math.round((state.steps/5000)*100));
var h=””;
h+=”<div class='score-sec'>”+ring(score,rc,150,14)+”<div class='score-sub'>Healing Score Today</div></div>”;
h+=”<div class='week-card'><div style='font-size:14px;font-weight:800;'>📅 Weekly Progress</div><div class='week-bars'>”;
var wd=state.weekData.slice(0,6).concat([score]);
for(var i=0;i<7;i++){
var v=wd[i]||0;
var bh=Math.round((v/100)*100);
var bc=v>=80?”#00C853”:(v>=50?”#FFD600”:”#FF2D6B”);
h+=”<div class='wbar-wrap'><div class='wbar-bg'><div class='wbar-fill' style='height:"+bh+"%;background:"+bc+";'></div></div><div class='wday'>”+days[i]+”</div></div>”;
}
h+=”</div></div>”;
h+=”<div class='prog-sec'><div class='sec-title' style='margin-top:0;'>Category Progress</div>”;
for(var i=0;i<CATS.length;i++){
var cat=CATS[i];var cs=getCatStats(cat.id);
h+=”<div class='prog-row'><div class='prog-row-top'><div class='prog-row-name'>”+cat.emoji+” “+cat.name+”</div><div class='prog-row-pct' style='color:"+cat.color+";'>”+cs.pct+”%</div></div>”+progBar(cs.pct,cat.color)+”</div>”;
}
h+=”</div>”;
h+=”<div class='steps-card'><div style='font-size:14px;font-weight:800;margin-bottom:10px;'>🦶 Daily Steps</div>”;
h+=”<div class='steps-num'>”+state.steps.toLocaleString()+”</div>”;
h+=”<div class='steps-goal'>Goal: 5,000 steps</div>”;
h+=progBar(sPct,“linear-gradient(90deg,#7C4DFF,#b39ddb)”);
h+=”<div class='steps-btns'><button class='steps-btn sub' onclick='stepsChange(-250)'>-250</button><button class='steps-btn add' onclick='stepsChange(250)'>+250</button></div></div>”;
el.innerHTML=h;
}

function stepsChange(d){
state.steps=Math.max(0,state.steps+d);saveState();renderProgress();
if(state.steps>=5000&&state.steps-d<5000)toast(“Step goal reached! You crushed it!”);
}

loadState();
renderHome();
renderExperts();
</script>
