<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lauras World">
<meta name="theme-color" content="#0a0a0a">
<title>Lauras World</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
--pink:#FF2D6B;--pink2:#FF6B9D;--pink3:#ff9ec0;
--blue:#00B4D8;--green:#00C853;--purple:#7C4DFF;
--orange:#FF9800;--yellow:#FFD600;
--bg:#0a0a0a;--card:#161616;--card2:#1e1e1e;--text:#fff;--sub:#aaa;
--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:#0a0a0a;font-family:'Nunito',sans-serif;color:#fff;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}

/* HEADER */
#app-header{
padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;
background:linear-gradient(180deg,#0a0a0a 80%,transparent);
display:flex;align-items:center;gap:12px;flex-shrink:0;
position:relative;z-index:10;
}
.header-avatar{width:52px;height:52px;flex-shrink:0;}
.header-text{}
.header-logo{
font-size:22px;font-weight:900;
background:linear-gradient(90deg,#FF2D6B,#FF6B9D,#ff9ec0);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
line-height:1.1;
}
.header-sub{font-size:10px;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

/* TAB CONTENT */
#tab-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 80px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#tab-content::-webkit-scrollbar{display:none;}

/* BOTTOM NAV */
#bottom-nav{
flex-shrink:0;
display:flex;
background:#111;
border-top:1px solid #222;
padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-btn{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:10px 4px 8px;border:none;background:transparent;color:#aaa;
font-family:‘Nunito’,sans-serif;font-size:10px;font-weight:700;gap:4px;cursor:pointer;
transition:color 0.2s;letter-spacing:0.5px;
}
.nav-btn.active{color:#FF2D6B;}
.nav-btn svg{width:22px;height:22px;transition:transform 0.2s;}
.nav-btn.active svg{transform:scale(1.15);}

/* TABS */
.tab-page{display:none;padding:8px 14px;}
.tab-page.active{display:block;}

/* CARDS */
.card{background:#161616;border-radius:18px;padding:16px;margin-bottom:12px;}
.card2{background:#1e1e1e;border-radius:14px;padding:14px;margin-bottom:10px;}

/* HERO CARD */
.hero-card{
background:linear-gradient(135deg,#1a0010,#2a001a,#1a0810);
border:1px solid rgba(255,45,107,0.3);
border-radius:22px;padding:20px;margin-bottom:14px;
position:relative;overflow:hidden;
}
.hero-card::before{
content:’’;position:absolute;top:-30px;right:-30px;
width:120px;height:120px;
background:radial-gradient(circle,rgba(255,45,107,0.2),transparent 70%);
border-radius:50%;
}
.hero-greeting{font-size:26px;font-weight:900;line-height:1.1;}
.hero-greeting span{
background:linear-gradient(90deg,#FF2D6B,#FF6B9D);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-date{font-size:12px;color:#aaa;margin:4px 0 10px;}
.hero-quote{font-size:13px;color:#ddd;line-height:1.5;font-style:italic;border-left:3px solid #FF2D6B;padding-left:10px;}

/* PROGRESS RING */
.ring-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:14px;}
.ring-label{font-size:12px;color:#aaa;margin-top:6px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.ring-val{font-size:28px;font-weight:900;color:#FF2D6B;}

/* STAT BOXES */
.stat-row{display:flex;gap:10px;margin-bottom:12px;}
.stat-box{flex:1;background:#161616;border-radius:14px;padding:12px 8px;text-align:center;}
.stat-box .val{font-size:22px;font-weight:900;}
.stat-box .lbl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* WATER */
.water-track{background:#161616;border-radius:18px;padding:16px;margin-bottom:12px;}
.water-title{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.water-btns{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.water-count{font-size:32px;font-weight:900;color:#00B4D8;text-align:center;flex:1;}
.water-sub{font-size:11px;color:#aaa;text-align:center;}
.btn-circle{
width:44px;height:44px;border-radius:50%;border:none;
background:linear-gradient(135deg,#FF2D6B,#FF6B9D);
color:#fff;font-size:22px;font-weight:900;cursor:pointer;
display:flex;align-items:center;justify-content:center;flex-shrink:0;
box-shadow:0 4px 12px rgba(255,45,107,0.4);
}

/* PROGRESS BAR */
.prog-bar-wrap{background:#222;border-radius:99px;height:8px;overflow:hidden;margin-top:6px;}
.prog-bar-fill{height:100%;border-radius:99px;transition:width 0.4s ease;}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.cat-card{
background:#161616;border-radius:16px;padding:14px 12px;cursor:pointer;
border:1px solid transparent;transition:all 0.2s;
}
.cat-card:active{transform:scale(0.97);}
.cat-icon{font-size:22px;margin-bottom:6px;}
.cat-name{font-size:12px;font-weight:800;margin-bottom:6px;line-height:1.2;}
.cat-pct{font-size:18px;font-weight:900;}

/* TIP CARD */
.tip-card{
background:linear-gradient(135deg,#0d1a1f,#0a1520);
border:1px solid rgba(0,180,216,0.3);
border-radius:18px;padding:16px;margin-bottom:12px;
}
.tip-title{font-size:13px;font-weight:800;color:#00B4D8;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.tip-text{font-size:12px;color:#ccc;line-height:1.6;}

/* TASKS TAB */
.task-cat-card{
background:#161616;border-radius:18px;padding:16px;margin-bottom:10px;cursor:pointer;
border:1px solid #222;transition:all 0.2s;display:flex;align-items:center;gap:14px;
}
.task-cat-card:active{transform:scale(0.98);background:#1e1e1e;}
.task-cat-icon{font-size:28px;flex-shrink:0;}
.task-cat-info{flex:1;min-width:0;}
.task-cat-name{font-size:15px;font-weight:800;margin-bottom:4px;}
.task-cat-count{font-size:11px;color:#aaa;}
.task-cat-pct{font-size:20px;font-weight:900;flex-shrink:0;}

/* TASK DETAIL */
#task-detail{display:none;padding:0 14px 8px;}
.back-btn{
display:flex;align-items:center;gap:8px;background:transparent;border:none;
color:#FF2D6B;font-family:‘Nunito’,sans-serif;font-size:15px;font-weight:800;
cursor:pointer;padding:10px 0 14px;
}
.task-item{
background:#161616;border-radius:16px;padding:14px;margin-bottom:10px;
border:1px solid #222;
}
.task-item-top{display:flex;align-items:flex-start;gap:10px;}
.task-checkbox{
width:22px;height:22px;border-radius:6px;border:2px solid #FF2D6B;
flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
background:transparent;transition:all 0.2s;margin-top:1px;
}
.task-checkbox.checked{background:#FF2D6B;border-color:#FF2D6B;}
.task-checkbox.checked::after{content:‘✓’;color:#fff;font-size:13px;font-weight:900;}
.task-info{flex:1;min-width:0;}
.task-name{font-size:14px;font-weight:800;line-height:1.3;}
.task-time{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:3px 0;opacity:0.7;}
.task-detail-txt{font-size:12px;color:#bbb;line-height:1.5;margin-top:6px;}
.task-remove{
background:transparent;border:1px solid #333;border-radius:8px;
color:#666;font-size:11px;font-weight:700;cursor:pointer;padding:4px 8px;
font-family:‘Nunito’,sans-serif;margin-top:8px;transition:all 0.2s;
}
.task-remove:active{background:#300;border-color:#f44;color:#f44;}

/* ADD TASK */
.add-task-btn{
width:100%;padding:14px;border-radius:14px;border:2px dashed #FF2D6B;
background:transparent;color:#FF2D6B;font-family:‘Nunito’,sans-serif;
font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;
}
.add-task-form{background:#1e1e1e;border-radius:16px;padding:16px;margin-top:10px;}
.form-input{
width:100%;padding:12px;border-radius:10px;border:1px solid #333;
background:#111;color:#fff;font-family:‘Nunito’,sans-serif;font-size:14px;
margin-bottom:10px;outline:none;
}
.form-input:focus{border-color:#FF2D6B;}
.form-submit{
width:100%;padding:13px;border-radius:10px;border:none;
background:linear-gradient(90deg,#FF2D6B,#FF6B9D);
color:#fff;font-family:‘Nunito’,sans-serif;font-size:15px;font-weight:800;cursor:pointer;
}

/* EXPERTS TAB */
.expert-card{
background:#161616;border-radius:18px;margin-bottom:10px;overflow:hidden;
border:1px solid #222;
}
.expert-header{
display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;
}
.expert-emoji{font-size:26px;flex-shrink:0;}
.expert-info{flex:1;}
.expert-name{font-size:15px;font-weight:800;}
.expert-role{font-size:11px;color:#aaa;margin-top:2px;}
.expert-chevron{color:#aaa;font-size:16px;transition:transform 0.3s;flex-shrink:0;}
.expert-card.open .expert-chevron{transform:rotate(180deg);}
.expert-body{
max-height:0;overflow:hidden;transition:max-height 0.35s ease;
padding:0 16px;
}
.expert-card.open .expert-body{max-height:600px;padding:0 16px 16px;}
.expert-bullet{
font-size:12px;color:#ccc;line-height:1.6;padding:5px 0;
border-bottom:1px solid #222;display:flex;gap:8px;
}
.expert-bullet:last-child{border-bottom:none;}
.bullet-dot{color:#FF2D6B;font-size:16px;flex-shrink:0;margin-top:-1px;}

/* PROGRESS TAB */
.score-section{display:flex;flex-direction:column;align-items:center;padding:20px 0 10px;}
.score-label{font-size:28px;font-weight:900;}
.score-sub{font-size:12px;color:#aaa;margin-top:4px;letter-spacing:1px;text-transform:uppercase;}
.week-chart{background:#161616;border-radius:18px;padding:16px;margin-bottom:12px;}
.week-title{font-size:14px;font-weight:800;margin-bottom:14px;}
.week-bars{display:flex;align-items:flex-end;gap:6px;height:80px;}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.week-bar-bg{flex:1;width:100%;background:#222;border-radius:6px;display:flex;align-items:flex-end;overflow:hidden;}
.week-bar-fill{width:100%;border-radius:6px;transition:height 0.5s ease;}
.week-day{font-size:9px;color:#aaa;font-weight:700;}
.prog-section{background:#161616;border-radius:18px;padding:16px;margin-bottom:12px;}
.prog-row{margin-bottom:12px;}
.prog-row:last-child{margin-bottom:0;}
.prog-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.prog-row-name{font-size:12px;font-weight:800;}
.prog-row-pct{font-size:12px;font-weight:700;}
.steps-section{background:#161616;border-radius:18px;padding:16px;margin-bottom:12px;}
.steps-title{font-size:14px;font-weight:800;margin-bottom:10px;}
.steps-count{font-size:36px;font-weight:900;color:#FF2D6B;text-align:center;margin:4px 0;}
.steps-goal{font-size:11px;color:#aaa;text-align:center;margin-bottom:10px;}
.steps-btns{display:flex;gap:10px;}
.steps-btn{
flex:1;padding:12px;border-radius:12px;border:none;
font-family:‘Nunito’,sans-serif;font-size:14px;font-weight:800;cursor:pointer;
transition:transform 0.15s;
}
.steps-btn:active{transform:scale(0.96);}
.steps-btn.add{background:linear-gradient(135deg,#FF2D6B,#FF6B9D);color:#fff;}
.steps-btn.sub{background:#222;color:#aaa;}

/* TOAST */
#toast{
position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
background:linear-gradient(90deg,#FF2D6B,#FF6B9D);
color:#fff;padding:12px 24px;border-radius:99px;
font-size:14px;font-weight:800;z-index:999;
opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;
box-shadow:0 8px 24px rgba(255,45,107,0.5);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SECTION TITLE */
.sec-title{font-size:16px;font-weight:900;margin:14px 0 10px;color:#FF2D6B;}
</style>

</head>

var state = {
  date: '',

  steps: 0,

};

function todayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function loadState() {
  var saved = localStorage.getItem('lauras_world_v2');
  var today = todayKey();
  if (saved) {
    var parsed = JSON.parse(saved);
    if (parsed.date === today) {
      state = parsed;
    } else {
      // New day - reset daily but keep week data
      var prevData = parsed.weekData || [0,0,0,0,0,0,0];
      var prevScore = calcScore(parsed.completions || {});
      // Shift week data
      prevData.shift();
      prevData.push(prevScore);
      state.weekData = prevData;
      state.date = today;
      state.completions = {};
      state.water = 0;
      state.steps = 0;
      saveState();
    }
  } else {
    state.date = today;
    saveState();
  }
}

function saveState() {
  state.date = todayKey();
  localStorage.setItem('lauras_world_v2', JSON.stringify(state));
}

function calcScore(completions) {
  var total = 0;
  var done = 0;
  for (var i = 0; i < CATEGORIES.length; i++) {
    var cat = CATEGORIES[i];
    for (var j = 0; j < cat.tasks.length; j++) {
      total++;
      if (completions[cat.tasks[j].id]) done++;
    }
  }
  return total > 0 ? Math.round((done/total)*100) : 0;
}

function getCatStats(catId) {
  var cat = null;
  for (var i = 0; i < CATEGORIES.length; i++) {
    if (CATEGORIES[i].id === catId) { cat = CATEGORIES[i]; break; }
  }
  if (!cat) return {done:0,total:0,pct:0};
  var total = cat.tasks.length;
  var done = 0;
  for (var j = 0; j < cat.tasks.length; j++) {
    if (state.completions[cat.tasks[j].id]) done++;
  }
  return {done:done, total:total, pct: total > 0 ? Math.round((done/total)*100) : 0};
}

function getTotalStats() {
  var total = 0, done = 0;
  for (var i = 0; i < CATEGORIES.length; i++) {
    var cat = CATEGORIES[i];
    for (var j = 0; j < cat.tasks.length; j++) {
      total++;
      if (state.completions[cat.tasks[j].id]) done++;
    }
  }
  return {done:done, left:total-done, total:total, pct: total > 0 ? Math.round((done/total)*100) : 0};
}

function makeProgBar(pct, color) {
  return '<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>';
}

function makeRing(pct, color, size, stroke) {
  size = size || 120;
  stroke = stroke || 10;
  var r = (size/2) - stroke;
  var circ = 2 * Math.PI * r;
  var dash = (pct/100) * circ;
  var cx = size/2;
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
    + '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="#222" stroke-width="' + stroke + '"/>'
    + '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="' + stroke + '"'
    + ' stroke-dasharray="' + dash + ' ' + circ + '" stroke-dashoffset="0" stroke-linecap="round"'
    + ' transform="rotate(-90 ' + cx + ' ' + cx + ')"/>'
    + '<text x="' + cx + '" y="' + (cx+2) + '" text-anchor="middle" dominant-baseline="middle" fill="' + color + '" font-size="' + Math.round(size*0.2) + '" font-weight="900" font-family="Nunito,sans-serif">' + pct + '%</text>'
    + '</svg>';
}

}

html += ‘</div></div>’;

// Category progress
html += ‘<div class="prog-section"><div class="sec-title" style="margin-top:0;">Category Progress</div>’;
for (var ci = 0; ci < CATEGORIES.length; ci++) {
var cat = CATEGORIES[ci];
var cs = getCatStats(cat.id);
html += ‘<div class="prog-row">’
+ ‘<div class="prog-row-top">’
+ ‘<div class="prog-row-name">’ + cat.emoji + ’ ’ + cat.name + ‘</div>’
+ ‘<div class="prog-row-pct" style="color:' + cat.color + ';">’ + cs.pct + ‘%</div>’
+ ‘</div>’
+ makeProgBar(cs.pct, cat.color)
+ ‘</div>’;
}
html += ‘</div>’;

// Steps
html += ‘<div class="steps-section">’
+ ‘<div class="steps-title">🦶 Daily Steps</div>’
+ ‘<div class="steps-count">’ + state.steps.toLocaleString() + ‘</div>’
+ ‘<div class="steps-goal">Goal: 5,000 steps</div>’
+ makeProgBar(stepsPct, ‘linear-gradient(90deg,#7C4DFF,#b39ddb)’)
+ ‘<div style="height:12px;"></div>’
+ ‘<div class="steps-btns">’
+ ‘<button class="steps-btn sub" onclick="stepsChange(-250)">-250</button>’
+ ‘<button class="steps-btn add" onclick="stepsChange(250)">+250</button>’
+ ‘</div>’
+ ‘</div>’;

el.innerHTML = html;
}

function stepsChange(delta) {
state.steps = Math.max(0, state.steps + delta);
saveState();
renderProgress();
if (state.steps >= 5000 && state.steps - delta < 5000) showToast(‘Step goal reached! You crushed it!’);
}

// ===================== INIT =====================
loadState();
renderHome();
renderExperts();

+ ‘self.addEventListener(“fetch”,function(e){e.respondWith(fetch(e.request).catch(function(){return new Response(“Offline”);}));});’;
var blob = new Blob([swCode], {type:‘application/javascript’});
var swUrl = URL.createObjectURL(blob);
navigator.serviceWorker.register(swUrl).catch(function(){});
}
